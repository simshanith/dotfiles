# ~/.tmux.conf
# Modern macOS configuration (no reattach-to-user-namespace needed since tmux 2.6+)

# ============================================================
# General
# ============================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g default-shell /bin/zsh
set -g history-limit 50000
set -s escape-time 0
set -g allow-passthrough all

# Window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ============================================================
# Mouse & clipboard
# ============================================================
set -g mouse on
set -g set-clipboard on

# Vi copy mode with system clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ============================================================
# Key bindings
# ============================================================
bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ============================================================
# Appearance (Solarized Dark from seebi/tmux-colors-solarized)
# ============================================================
set -g status-style bg=black,fg=white
set -g window-status-current-style bg=white,fg=black,bold
set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour39

# Full Solarized Dark theme, vendored from seebi/tmux-colors-solarized.
# (Was concatenated by Fresh; now sourced from the repo. tmux/ is kept out of
# chezmoi's apply tree via .chezmoiignore.)
source-file ~/.dotfiles/tmux/tmuxcolors-dark.conf
