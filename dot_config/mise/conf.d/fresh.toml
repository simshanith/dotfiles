# Shared mise baseline, version-controlled in the dotfiles repo.
# chezmoi symlinks this to ~/.config/mise/conf.d/fresh.toml.
# Machine-local entry point: ~/.config/mise/config.toml (seeded once, edit freely).
# Per-machine overrides: ~/.config/mise/config.local.toml.

[settings.github]
# Pull a GitHub token on demand from gh CLI to avoid API rate limits
# when mise fetches release metadata for aqua/ubi-backed tools.
credential_command = "gh auth token"

[settings.pipx]
uvx = true  # "pipx:<pkg>" installs via `uv tool`, no pipx binary needed (default when uv present)

[tools]
# Languages
bun  = "latest"
go   = "latest"
node = "22"
rust = "latest"

# Python: uv owns interpreters, venvs, and `uv run` scripts. CLI tools are "pipx:<pkg>".
# Ad-hoc analog of `uv tool install <pkg>`: `mise use -g pipx:<pkg>`, then promote here.
uv = "latest"

# Modern CLI
bat     = "latest"
fd      = "latest"
fzf     = "latest"
ripgrep = "latest"
zoxide  = "latest"
jq      = "latest"
yazi    = "latest"
# tree: not in mise registry under that short name — left in Brewfile

# Git
delta   = "latest"  # git-delta
gh      = "latest"
lazygit = "latest"
# tig: not in mise registry under that short name — left in Brewfile

# Shell prompt
starship = "latest"

# Command-correction (Rust thefuck replacement; press F to apply suggestion)
"aqua:iffse/pay-respects" = "latest"

# AI coding agents
codex    = "latest"  # openai/codex
opencode = "latest"  # anomalyco/opencode
rtk      = "latest"  # aqua:rtk-ai/rtk — token-optimizing CLI proxy for Claude Code.

# Dotfiles management — must be in the committed baseline so a fresh machine's
# install.sh (mise install -> chezmoi init) can bootstrap. (Previously chezmoi
# lived only in the machine-local config.toml via `mise use -g`, which a clean
# checkout would not have.)
chezmoi = "latest"

# Emacs dev tooling: LSP servers (Eglot) + formatters (apheleia) backing the
# Emacs setup for dotfiles + silicon-grove. See ~/.dotfiles/emacs.md.
# NOTE: tree-sitter grammars are NOT listed here — treesit-auto downloads them
# on first file open. Only language servers + formatters belong in mise.
# NOTE: this installs fleet-wide via the shared baseline. If you'd rather keep
# LSP servers off headless boxes, move this block to config.local.toml.
"npm:typescript-language-server"        = "latest"  # TS / JS / TSX
"npm:yaml-language-server"              = "latest"  # YAML
"npm:vscode-langservers-extracted"      = "latest"  # JSON / CSS / HTML / ESLint
"npm:bash-language-server"              = "latest"  # Bash / sh
"npm:dockerfile-language-server-nodejs" = "latest"  # Dockerfile
marksman = "latest"  # Markdown LSP
"pipx:grip" = "latest"  # GitHub-accurate markdown preview (Emacs grip-mode)
# Formatters for apheleia (format-on-save off by default; C-c f formats once):
prettier = "latest"  # TS / JSON / YAML / Markdown
shfmt    = "latest"  # shell
taplo    = "latest"  # TOML
# rust-analyzer + rustfmt ship with the rust toolchain. If rust-analyzer is
# absent:  rustup component add rust-analyzer rustfmt

# Clojure / ClojureScript toolchain (TODO — uncomment when doing clj/cljs).
# Pairs with the staged Clojure layer documented in ~/.dotfiles/emacs.md.
# clojure   = "latest"  # clj / clojure CLI (deps.edn, tools.build)
# babashka  = "latest"  # bb: fast-startup Clojure scripting (shell-script killer)
# clj-kondo = "latest"  # linter (Emacs: flycheck-clj-kondo)
# "github:clojure-lsp/clojure-lsp" = "latest"  # LSP server for Eglot
# leiningen = "latest"  # optional: classic build tool, only if a project needs it
# cljs builds run through shadow-cljs (npm, per-project) or figwheel; CIDER
# connects to that REPL — no extra global tool needed.
